### Model
model_name_or_path: /mnt/nvme1/hf-model/Meta-Llama-3.1-8B-Instruct

### Method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_alpha: 16
lora_target: q_proj,v_proj,k_proj,o_proj
lora_dropout: 0.05

### Dataset
dataset: media_medicine_news_1k
dataset_dir: data
template: llama3
cutoff_len: 1024
preprocessing_num_workers: 16

### Training
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### Evaluation
val_size: 0.1
per_device_eval_batch_size: 4
eval_strategy: steps
eval_steps: 10

### Output
output_dir: /mnt/nvme1/lcx/academic_social_impact/media_medicine_news_1k
logging_steps: 5
save_steps: 50
save_total_limit: 2
load_best_model_at_end: false
plot_loss: true
overwrite_output_dir: true
report_to: none
