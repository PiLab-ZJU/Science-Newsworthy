### Model
model_name_or_path: /mnt/nvme1/hf-model/Meta-Llama-3.1-8B-Instruct

### Method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 32
lora_alpha: 64
lora_target: q_proj,v_proj,k_proj,o_proj,gate_proj,up_proj,down_proj
lora_dropout: 0.05

### Dataset
dataset: media_combined_cot_balanced
dataset_dir: data
template: llama3
cutoff_len: 1024
preprocessing_num_workers: 16

### Training
per_device_train_batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 2.0e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### Evaluation
val_size: 0.1
per_device_eval_batch_size: 4
eval_strategy: steps
eval_steps: 500

### Output
output_dir: /mnt/nvme1/lcx/academic_social_impact/media_combined_cot_r32
logging_steps: 50
save_steps: 500
save_total_limit: 3
plot_loss: true
overwrite_output_dir: true
report_to: none
