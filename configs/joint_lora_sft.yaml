### Model
model_name_or_path: meta-llama/Llama-3.1-8B-Instruct

### Method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_target: q_proj,v_proj,k_proj,o_proj
lora_dropout: 0.05

### Dataset — Joint media + policy training (RQ5)
dataset: media_policy_joint
template: llama3
cutoff_len: 1024
preprocessing_num_workers: 16

### Training
per_device_train_batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 2.0e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### Evaluation
val_size: 0.15
per_device_eval_batch_size: 4
eval_strategy: steps
eval_steps: 200

### Output
output_dir: outputs/joint_lora_sft
logging_steps: 50
save_steps: 200
save_total_limit: 3
load_best_model_at_end: true
plot_loss: true
overwrite_output_dir: true
